name: 每日回檔燈號更新（GitHub Pages）

on:
  schedule:
    - cron: '0 22 * * *'      # 每天 UTC 22:00 ≈ 台灣 06:00
  workflow_dispatch:           # 允許手動觸發

permissions:
  contents: write

jobs:
  update-lights:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 算回檔燈號（產生 data.json）
        run: python3 scripts/update_lights.py

      - name: 提交 data.json（推送即自動重建 Pages）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: 每日回檔燈號更新 [skip ci]" || echo "no changes"
          git push
